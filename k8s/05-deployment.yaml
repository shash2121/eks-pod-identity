apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: default
  labels:
    app: sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      serviceAccountName: dev
      containers:
        - name: sample-app
          image: sha2121/pod-identity:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            # DB parts from ConfigMap
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: dev-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: dev-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: dev-config
                  key: DB_NAME
            - name: DB_IDENTIFIER
              valueFrom:
                configMapKeyRef:
                  name: dev-config
                  key: DB_IDENTIFIER
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: dev-config
                  key: AWS_REGION
            # Credentials from Secrets Manager
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: dev-aws-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dev-aws-secret
                  key: DB_PASSWORD
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: secrets
              mountPath: /mnt/secrets
              readOnly: true
      volumes:
        - name: secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: dev-aws-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: default
spec:
  selector:
    app: sample-app
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP
